<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Empire AI Assistant</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #0f172a;
  color: white;
  display: flex;
  flex-direction: column;
  height: 100vh;
}

header {
  padding: 15px;
  background: #020617;
  text-align: center;
  font-size: 20px;
  font-weight: bold;
}

#chat {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}

.message {
  margin-bottom: 15px;
  max-width: 70%;
  padding: 12px;
  border-radius: 10px;
}

.user {
  background: #22c55e;
  margin-left: auto;
}

.bot {
  background: #1e293b;
}

#inputArea {
  display: flex;
  padding: 10px;
  background: #020617;
}

input {
  flex: 1;
  padding: 10px;
  border: none;
  border-radius: 5px;
}

button {
  margin-left: 10px;
  padding: 10px 15px;
  background: #22c55e;
  border: none;
  color: white;
  border-radius: 5px;
  cursor: pointer;
}
</style>
</head>

<body>

<header>Empire AI Assistant</header>

<div id="chat"></div>

<div id="inputArea">
  <input id="userInput" placeholder="Ask about custom apparel..." />
  <button onclick="sendMessage()">Send</button>
</div>

<script>
const chat = document.getElementById("chat");

function addMessage(text, sender) {
  const msg = document.createElement("div");
  msg.classList.add("message", sender);
  msg.innerText = text;
  chat.appendChild(msg);
  chat.scrollTop = chat.scrollHeight;
}

async function sendMessage() {
  const input = document.getElementById("userInput");
  const text = input.value.trim();
  if (!text) return;

  addMessage(text, "user");
  input.value = "";

  try {
    const res = await fetch("https://empire-backend-zgyh.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await res.json();

    addMessage(data.reply || "No response from AI", "bot");

  } catch (err) {
    addMessage("Error connecting to server", "bot");
  }
}
</script>

</body>
</html>
